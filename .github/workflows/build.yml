name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Build
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

      - name: Package
        run: |
          # Troviamo l'eseguibile .exe generato da Flutter (il vero output "runner")
          $exe = Get-ChildItem -Path "build\windows" -Filter "*.exe" -Recurse |
                 Where-Object { $_.FullName -match "runner\\Release" } |
                 Select-Object -First 1

          if (-not $exe) {
            Write-Host "Struttura build\windows:"
            Get-ChildItem -Path "build\windows" -Recurse | Select-Object FullName
            Write-Error "ERRORE: Eseguibile Release non trovato!"
            exit 1
          }

          $releaseDir = $exe.DirectoryName
          Write-Host "Target Release Directory: $releaseDir"
          Write-Host "Contenuto cartella Release:"
          Get-ChildItem $releaseDir

          Compress-Archive -Path "$releaseDir\*" -DestinationPath household_vtt-windows.zip -Force

          if (-not (Test-Path "household_vtt-windows.zip")) {
            Write-Error "ERRORE: household_vtt-windows.zip non è stato creato!"
            exit 1
          }

          Write-Host "Zip creato correttamente:"
          Get-Item household_vtt-windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: household_vtt-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Disable Swift Package Manager
        run: |
          flutter config --no-enable-swift-package-manager

      - name: Build
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release

      - name: Package
        run: |
          # Usiamo zip standard per macOS
          cd build/macos/Build/Products/Release
          zip -r -y ../../../../../household_vtt-macos.zip *.app
          cd -

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: household_vtt-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.9
          files: |
            artifacts/windows-build/household_vtt-windows.zip
            artifacts/macos-build/household_vtt-macos.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}