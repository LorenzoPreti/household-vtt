name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Build
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release

      - name: Package
        run: |
          # Trova la cartella Release in modo dinamico
          $releaseDir = Get-ChildItem -Path "build\windows" -Filter "Release" -Directory -Recurse | Select-Object -ExpandProperty FullName -First 1
          Compress-Archive -Path "$releaseDir\*" -DestinationPath household_vtt-windows.zip -Force
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: household_vtt-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Build
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          # Rimosso --no-codesign, usiamo il comando pulito
          flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y ../../../../../household_vtt-macos.zip *.app
          cd -

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: household_vtt-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-build/household_vtt-windows.zip
            artifacts/macos-build/household_vtt-macos.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}