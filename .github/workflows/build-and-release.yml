name: Build & Release (Windows + macOS)

# Si attiva quando pushi un tag tipo v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release

      - name: Package files
        run: |
          # Trova la cartella Release dove flutter ha compilato l'app
          $releaseDir = Get-ChildItem -Path "build\windows" -Filter "Release" -Directory -Recurse | Select-Object -ExpandProperty FullName -First 1
          # Crea lo zip partendo dal contenuto della cartella Release
          Compress-Archive -Path "$releaseDir\*" -DestinationPath household_vtt-windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: household_vtt-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: |
          flutter config --enable-macos-desktop
          flutter build macos --release

      - name: Zip macOS build (preserva permessi .app)
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent *.app ../../../../../household_vtt-macos.zip
          cd -

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: household_vtt-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-artifacts/household_vtt-windows.zip
            artifacts/macos-artifacts/household_vtt-macos.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}